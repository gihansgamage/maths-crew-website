name: Update YouTube data

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  update-youtube-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest YouTube data
        run: node scripts/update-youtube-data.js
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit updated YouTube data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update YouTube data
          file_pattern: data/youtube.json
